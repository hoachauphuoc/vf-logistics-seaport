name: VF_LOGISTICS_SEMANTIC
description: >
  Semantic model for VF Logistics maritime shipment data. 
  Enables natural language querying of Bill of Lading records, 
  port information, carrier analytics, and fraud alerts.

tables:
  - name: BILL_OF_LADING
    base_table:
      database: MENDIX_APP
      schema: AGENTS
      table: BILL_OF_LADING
    description: >
      Main operational table containing 10,010 Bill of Lading (B/L) records.
      Each record represents a maritime shipment with carrier, route, cargo, 
      weight, charges, and processing status information.
    dimensions:
      - name: BL_NUMBER
        description: Unique Bill of Lading document number
        expr: BL_NUMBER
        synonyms: ["bl number", "bill of lading", "van don", "vận đơn"]
      - name: CARRIER_NAME
        description: Shipping carrier/line name (e.g., Maersk, MSC, Evergreen)
        expr: CARRIER_NAME
        synonyms: ["carrier", "shipping line", "hang tau", "hãng tàu"]
      - name: VESSEL_NAME
        description: Name of the vessel/ship
        expr: VESSEL_NAME
        synonyms: ["vessel", "ship", "tau", "tàu"]
      - name: PORT_OF_LOADING
        description: Port where cargo is loaded (origin port)
        expr: PORT_OF_LOADING_LOCODE
        synonyms: ["POL", "loading port", "origin", "cang xep", "cảng xếp"]
      - name: PORT_OF_DISCHARGE
        description: Port where cargo is discharged (destination port)
        expr: PORT_OF_DISCHARGE_LOCODE
        synonyms: ["POD", "discharge port", "destination", "cang do", "cảng dỡ", "diem den", "điểm đến"]
      - name: STATUS
        description: Current processing status (DRAFT, Pending_Review, VALIDATED, APPROVED, In_Transit, SAP_POSTED)
        expr: STATUS
        synonyms: ["status", "trang thai", "trạng thái"]
      - name: CONTAINER_NUMBER
        description: Container identification number (ISO 6346 format)
        expr: CONTAINER_NUMBER
        synonyms: ["container", "container no"]
      - name: CONTAINER_TYPE
        description: Container type (20GP, 40GP, 40HC, 20RF)
        expr: CONTAINER_TYPE
      - name: HS_CODE
        description: Harmonized System code for commodity classification
        expr: HS_CODE
        synonyms: ["hs code", "tariff code", "ma hs", "mã HS"]
      - name: COMMODITY
        description: Description of the cargo/commodity being shipped
        expr: COMMODITY_DESCRIPTION
        synonyms: ["commodity", "cargo", "goods", "hang hoa", "hàng hóa"]
      - name: SYNCED_TO_ERP
        description: Whether this B/L has been synced to SAP ERP (TRUE/FALSE)
        expr: SYNCED_TO_ERP
        synonyms: ["sap synced", "erp status", "dong bo SAP"]
      - name: ETD
        description: Estimated Time of Departure (date)
        expr: ETD
        synonyms: ["departure date", "ngay di", "ngày đi"]
      - name: ETA
        description: Estimated Time of Arrival (date)
        expr: ETA
        synonyms: ["arrival date", "ngay den", "ngày đến"]
    measures:
      - name: TOTAL_SHIPMENTS
        description: Total number of shipments/B/L records
        expr: COUNT(*)
        synonyms: ["shipments", "total", "how many", "bao nhieu", "bao nhiêu"]
      - name: TOTAL_WEIGHT_KG
        description: Total gross weight in kilograms
        expr: SUM(GROSS_WEIGHT_KGS)
        synonyms: ["total weight", "trong luong", "trọng lượng"]
      - name: TOTAL_CHARGES_USD
        description: Total shipping charges in USD
        expr: SUM(TOTAL_CHARGES)
        synonyms: ["total revenue", "charges", "phi", "phí", "doanh thu"]
      - name: AVG_WEIGHT_KG
        description: Average weight per shipment in kg
        expr: AVG(GROSS_WEIGHT_KGS)
      - name: AVG_CHARGES_USD
        description: Average charge per shipment in USD
        expr: AVG(TOTAL_CHARGES)
      - name: PENDING_COUNT
        description: Number of pending shipments awaiting review
        expr: COUNT_IF(STATUS IN ('Pending_Review', 'PENDING', 'DRAFT'))
        synonyms: ["pending", "cho duyet", "chờ duyệt"]
      - name: SAP_POSTED_COUNT
        description: Number of shipments successfully posted to SAP
        expr: COUNT_IF(STATUS = 'SAP_POSTED')
        synonyms: ["sap posted", "da gui SAP", "đã gửi SAP"]
      - name: IN_TRANSIT_COUNT
        description: Number of shipments currently in transit
        expr: COUNT_IF(STATUS = 'In_Transit')
        synonyms: ["in transit", "dang van chuyen", "đang vận chuyển"]

  - name: FRAUD_ALERT
    base_table:
      database: MENDIX_APP
      schema: AGENTS
      table: FRAUD_ALERT
    description: >
      Fraud detection alerts generated by the 5-rule anomaly detection system.
      Each alert has a type, severity, and status (OPEN or RESOLVED).
    dimensions:
      - name: ALERT_TYPE
        description: Type of fraud detected (DUPLICATE_BL, DUPLICATE_CONTAINER, INVALID_CONTAINER, WEIGHT_ANOMALY, POSSIBLE_COPY)
        expr: ALERT_TYPE
        synonyms: ["alert type", "loai canh bao"]
      - name: SEVERITY
        description: Alert severity level (HIGH, MEDIUM)
        expr: SEVERITY
        synonyms: ["severity", "muc do", "mức độ"]
      - name: ALERT_STATUS
        description: Current status (OPEN or RESOLVED)
        expr: STATUS
        synonyms: ["status", "trang thai"]
    measures:
      - name: TOTAL_ALERTS
        description: Total number of fraud alerts
        expr: COUNT(*)
        synonyms: ["alerts", "canh bao", "cảnh báo"]
      - name: OPEN_ALERTS
        description: Number of open/unresolved alerts
        expr: COUNT_IF(STATUS = 'OPEN')
        synonyms: ["open alerts", "canh bao mo"]
      - name: HIGH_SEVERITY_COUNT
        description: Number of HIGH severity alerts
        expr: COUNT_IF(SEVERITY = 'HIGH')

  - name: PORT_MASTER
    base_table:
      database: MENDIX_APP
      schema: AGENTS
      table: PORT_MASTER
    description: Reference table of 70 worldwide ports with location data.
    dimensions:
      - name: PORT_CODE
        description: UN/LOCODE port identifier
        expr: PORT_CODE
      - name: PORT_NAME
        description: Full port name
        expr: PORT_NAME
        synonyms: ["port", "cang", "cảng"]
      - name: COUNTRY
        description: Country where port is located
        expr: COUNTRY
        synonyms: ["country", "quoc gia", "quốc gia"]
    measures:
      - name: TOTAL_PORTS
        description: Total number of ports
        expr: COUNT(*)

verified_queries:
  - question: "How many shipments are pending?"
    sql: "SELECT COUNT(*) as PENDING_SHIPMENTS FROM MENDIX_APP.AGENTS.BILL_OF_LADING WHERE STATUS IN ('Pending_Review', 'PENDING', 'DRAFT')"
  - question: "What are the top 5 carriers by shipment count?"
    sql: "SELECT CARRIER_NAME, COUNT(*) as SHIPMENTS FROM MENDIX_APP.AGENTS.BILL_OF_LADING GROUP BY CARRIER_NAME ORDER BY SHIPMENTS DESC LIMIT 5"
  - question: "How many open fraud alerts are there?"
    sql: "SELECT COUNT(*) as OPEN_ALERTS FROM MENDIX_APP.AGENTS.FRAUD_ALERT WHERE STATUS = 'OPEN'"
  - question: "Total revenue by destination country?"
    sql: "SELECT p.COUNTRY, SUM(b.TOTAL_CHARGES) as REVENUE FROM MENDIX_APP.AGENTS.BILL_OF_LADING b JOIN MENDIX_APP.AGENTS.PORT_MASTER p ON b.PORT_OF_DISCHARGE_LOCODE = p.PORT_CODE GROUP BY p.COUNTRY ORDER BY REVENUE DESC LIMIT 10"
  - question: "How many shipments are in transit?"
    sql: "SELECT COUNT(*) as IN_TRANSIT FROM MENDIX_APP.AGENTS.BILL_OF_LADING WHERE STATUS = 'In_Transit'"
